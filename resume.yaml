basics:
  display_name: "Dr. John D. Kirwan"
  first_name: "John D."
  last_name: "Kirwan"
  suffix: "PhD"
  headline: "Bioinformatics Scientist & Computational Biologist"
  role: "Bioinformatics Scientist"
  email: "john@jkirwan.org"
  phone: "+34 639981732"
  website: "https://jkirwan.org"
  location: "San Cristóbal de la Laguna, Spain"
  summary: |
    Computational biologist and data scientist with a track record of applying machine
    learning and statistical modelling to complex biological problems — from biomolecular
    structure prediction and de novo peptide design to metagenomic analysis and preclinical
    trial design. My background combines rigorous quantitative training (Bayesian modelling,
    deep learning, MLOps) with hands-on experience across the full data pipeline — from
    experimental design through to deployment and reproducible reporting. I have worked at
    the interface of Biotech and AI in an industry research setting, contributing to work
    that reached commercial spinout stage and to a NeurIPS 2025 publication on uncertainty
    quantification in deep regression. I am now looking to bring this skillset to health
    informatics and clinical data science, where the same analytical rigour can drive
    decisions with direct patient impact.

