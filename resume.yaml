experience:
  - position: "Bioinformatics Scientist"
    organization:
      name: "Arquimea Research Centre"
      url: "https://www.arquimea.com/research-development-innovation/research-center/"
    location: "La Laguna, Spain"
    date_start: "2022-07-04"
    date_end: "2026-03-11"
    summary: |
      Bridged Biotech and AI departments to develop machine learning workflows for drug
      design, contributing to research that progressed to a commercial spinout. Contributing
      author on a NeurIPS 2025 publication on uncertainty quantification in deep regression.
    highlights:
      - "Developed pipelines for synthetic data generation, protein and biomolecular structure prediction, and de novo design of oligopeptides and small molecules"
      - "Worked with metagenomic data, preclinical power testing, and data visualisation"
      - "Built and tracked ML experiments using Python, PyTorch and Valohai; managed containerised workflows with Docker in a Git-versioned codebase"
      - "Delivered work within an Agile/Scrum team using Azure DevOps for CI/CD; additional cloud experience with AWS"
  - position: "Postdoctoral Researcher"
    organization:
      name: "Stazione Zoologica Anton Dohrn"
      url: "http://www.szn.it"
    location: "Naples, Italy"
    date_start: "2019-10-01"
    date_end: "2022-07-22"
    summary: |
      Quantitative research in sensory biology, with emphasis on statistical modelling
      and signal processing of behavioural data.
    highlights:
      - "Analysed experimental data using Bayesian multilevel regression models in R and Stan"
      - "Designed and executed behavioural experiments with automated data acquisition pipelines"
      - "Contributed to interdisciplinary publications spanning biology, optics, and computation"
  - position: "Project Manager (contract)"
    organization:
      name: "Lund University"
      url: "http://www.lu.se"
    location: "Lund, Sweden"
    date_start: "2019-06-01"
    date_end: "2019-08-31"
    summary: |
      Short-term research management contract supervising experimental data collection
      and a masters student, bridging doctoral and postdoctoral positions.
    highlights: []
  - position: "Doctoral Researcher"
    organization:
      name: "Lund University"
      url: "http://www.lu.se"
    location: "Lund, Sweden"
    date_start: "2013-05-15"
    date_end: "2018-06-07"
    summary: |
      Computational and statistical analysis of visual systems in invertebrates,
      combining experimental biology with quantitative modelling.
    highlights:
      - "Built statistical models using Bayesian multilevel regression in R and Stan; additional analysis in Python and Matlab"
      - "Developed optical and geometric models to estimate spatial resolution theoretically"
      - "Designed novel experimental protocols for quantifying animal visual performance"

